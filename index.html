<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Welcome — Moothi</title>

  <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin />

  <style>
    /* ─── RESET & BASE ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clr-bg: #000;
      --transition: 0.3s cubic-bezier(.4,0,.2,1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--clr-bg);
      color: #f0f0f0;
      min-height: 100vh; /* Changed from dvh for better previewer support */
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── LOADING SCREEN ───────────────────────────────────────────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(212, 0, 108, 0.2);
      border-top-color: #d4006c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── LANDING PAGE ─────────────────────────────────────────────────────── */
    #view-landing {
      position: relative;
      min-height: 100vh;
      background: linear-gradient(135deg, #90003a 0%, #1a0033 100%);
      overflow: hidden;
      display: none; 
    }

    #view-landing::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 60%, rgba(0,255,200,0.12) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0,180,255,0.07) 0%, transparent 60%);
      pointer-events: none; z-index: 1;
    }

    #view-landing::after {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1; opacity: 0.5;
    }

    #landing-brand {
      position: absolute; top: 20px; left: 22px;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem); font-weight: 700; color: #fff;
      letter-spacing: 1px; text-shadow: 0 2px 20px rgba(0,0,0,0.4); z-index: 10; user-select: none;
    }

    /* TYPEWRITER TEXT */
    #typewriter-container {
      position: absolute; top: 90px; left: 22px; right: 22px; z-index: 10;
      pointer-events: none; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }
    
    .type-line-1 { font-size: clamp(1.4rem, 6vw, 2.2rem); font-weight: 800; color: #fff; margin-bottom: 8px; line-height: 1.2; }
    .type-line-2 { font-size: clamp(1rem, 4vw, 1.3rem); font-weight: 500; color: rgba(255, 255, 255, 0.85); line-height: 1.4; }

    .cursor {
      display: inline-block; width: 3px; height: 1em; background-color: #d4006c;
      vertical-align: text-bottom; animation: blink 0.8s step-end infinite; margin-left: 4px;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* CHARACTER IMAGE */
    #landing-character {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; height: 95vh; object-fit: cover; object-position: bottom center;
      z-index: 2; pointer-events: none; opacity: 0; transition: opacity 0.5s ease;
    }

    /* BUTTON WRAPPER */
    #landing-buttons {
      position: absolute;
      bottom: 40px; /* Changed to fixed pixels so it doesn't hide on small screens */
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      width: min(360px, 88vw);
      align-items: center;
    }

    /* BUTTON STYLING */
    .landing-btn {
      width: 100%; padding: 18px 20px;
      border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 16px;
      cursor: pointer; font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px;
      text-align: center; transition: transform var(--transition), background var(--transition);
      background: rgba(212, 0, 108, 0.35); /* Made slightly more visible */
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: #fff; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent;
    }

    .landing-btn:hover, .landing-btn:focus { background: rgba(212, 0, 108, 0.5); }
    .landing-btn:active { transform: scale(0.97); }

    /* RESPONSIVE DESKTOP */
    @media (min-width: 768px) {
      #landing-character { left: auto; right: 0; bottom: 0; transform: none; height: 95vh; width: 50vw; max-width: 600px; object-fit: contain; object-position: bottom right; }
      #typewriter-container { top: 30%; left: 8%; width: 45vw; }
      #landing-buttons { left: 8%; bottom: auto; top: 55%; transform: translateY(-50%); width: 340px; }
    }
  </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="spinner"></div>
</div>

<!-- MAIN LANDING PAGE -->
<div id="view-landing">
  <span id="landing-brand">Moothi</span>

  <!-- TYPEWRITER TEXT -->
  <div id="typewriter-container">
    <div class="type-line-1">
      <span id="text-part-1"></span><span class="cursor" id="cursor-1"></span>
    </div>
    <div class="type-line-2">
      <span id="text-part-2"></span><span class="cursor" id="cursor-2" style="display: none;"></span>
    </div>
  </div>
  
  <!-- BACKGROUND CHARACTER IMAGE -->
  <img id="landing-character" src="" alt="Character" />

  <!-- REDIRECT BUTTON -->
  <div id="landing-buttons">
    <button class="landing-btn" onclick="window.location.href='YOUR_REDIRECT_LINK_HERE'">
      Watch all videos for free
    </button>
  </div>
</div>

<script>
  const DATA_URL = 'https://raw.githubusercontent.com/nehu25/muthi/refs/heads/main/data.json';
  
  const msg1 = "Welcome to the Nehu Hub Community";
  const msg2 = "Discover the Internet's Most Viral Videos.";
  const typingSpeed = 45; 

  const characterImg = document.getElementById('landing-character');

  // ─── SAFE TYPEWRITER LOGIC (Fixes 400ms Error) ───
  function typeText(elementId, text, cursorIdToHide, cursorIdToShow) {
    return new Promise((resolve) => {
      const el = document.getElementById(elementId);
      if (cursorIdToShow) document.getElementById(cursorIdToShow).style.display = 'inline-block';
      
      let i = 0;
      function typeNextChar() {
        if (i < text.length) {
          el.innerHTML += text.charAt(i);
          i++;
          setTimeout(typeNextChar, typingSpeed); // Safe for previewers
        } else {
          if (cursorIdToHide) document.getElementById(cursorIdToHide).style.display = 'none';
          resolve(); 
        }
      }
      typeNextChar();
    });
  }

  async function startTypewriterSequence() {
    await typeText('text-part-1', msg1, 'cursor-1', null);
    await typeText('text-part-2', msg2, null, 'cursor-2');
  }

  // ─── INIT & PRELOADER ───
  function showLandingPage() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('view-landing').style.display = 'block';
    
    setTimeout(() => {
      characterImg.style.opacity = '1';
      startTypewriterSequence();
    }, 100);
  }

  async function fetchAndLoadImage() {
    try {
      const response = await fetch(DATA_URL, { cache: 'force-cache' });
      if (!response.ok) throw new Error("Network response failed");
      
      const data = await response.json();
      const imgUrl = data.settings?.landingCharacterImage;

      if (imgUrl) {
        characterImg.src = imgUrl;
        if (characterImg.complete && characterImg.naturalHeight !== 0) {
          showLandingPage();
        } else {
          characterImg.onload = showLandingPage;
          characterImg.onerror = showLandingPage; 
        }
      } else {
        showLandingPage();
      }
    } catch (error) {
      console.warn('Failed to fetch data:', error);
      showLandingPage(); 
    }
  }

  document.addEventListener('DOMContentLoaded', fetchAndLoadImage);
</script>

</body>
</html>
